  <!-- Custom CSS -->
  <style type="text/css">
    #systemDetails,
    #hud {
      width: 350px;
    }

    #edmap {
      position: fixed;
      top: 6%;
      right: 0;
      width: 100%;
      height: 93%;
      z-index: -1;
    }
  </style>

  <title>CanonnED3D - Galnet Relay Stations</title>

</head>

<body bgcolor="#000000">
  <script src="https://www.w3schools.com/lib/w3data.js"></script>
  <div w3-include-html="include/nav.html"></div>

  <script>
    w3IncludeHTML();
  </script>

  <div id="edmap">
    <div id="loading">
      <style>
        #bodymovin-wrap{display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999}
        #bodymovin{width:800px;max-width:100%;display:block;overflow:hidden;transform:translate3d(0,0,0)}
        .botas_loop_3,.btas_loop_2{display:none}
      </style>
      <script src="vendor/bodymovin/bodymovin.min.js"></script>
      <div id="bodymovin-wrap"><div id="bodymovin"></div></div>
      <script>
        var anim;
        var animElem = document.getElementById('bodymovin');
        var animData = {
          container: animElem,
          renderer: 'svg',
          loop: true,
          autoplay: true,
          rendererSettings: { progressiveLoad: false },
          path: 'data/rd-banner-v2-1.json'
        };
        anim = bodymovin.loadAnimation(animData);
        if (anim && typeof anim.play === 'function') anim.play();
      </script>
    </div>

    <!-- ED3D Map -->
    <script src="js/ed3dmap.js"></script>
    <link rel="stylesheet" type="text/css" href="css/styles.css" />

    <!-- Galnet relay station data -->
    <script src="data/MapData-Galnet.js"></script>
  </div>
</body>
