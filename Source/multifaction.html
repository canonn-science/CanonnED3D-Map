<head>

  <script>
    window.ga = window.ga || function () {
      (ga.q = ga.q || []).push(arguments)
    };

    ga('create', 'UA-102148507-1', 'auto');
    ga('send', 'pageview');
  </script>
  <script async src='https://www.google-analytics.com/analytics.js'></script>
  <link href="https://fonts.googleapis.com/css?family=Orbitron:400" rel="stylesheet" type="text/css" />
  <script src="/js/jquery-2.1.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r75/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.19.0/axios.min.js"></script>
  <script src="vendor/papaparse/papaparse.min.js"></script>

  <link rel="stylesheet" type="text/css" href="css/menu.css" />
  <link rel="stylesheet" type="text/css" href="css/style.css" />
  <link rel="stylesheet" type="text/css" href="css/styles.css" />

  <!-- Custom CSS -->
  <style type="text/css">
    #systemDetails,
    #hud {
      width: 350px;
    }

    #edmap {
      position: fixed;
      top: 6%;
      right: 0;
      width: 100%;
      height: 93%;
      z-index: -1;
    }

    /* Faction Search UI — lives inside the HUD #filters panel */
    #faction-search-container {
      padding: 0 0 10px 0;
      margin-bottom: 8px;
      border-bottom: 1px solid #2a2a2a;
    }
    #faction-search-label {
      color: #ff8c00;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      display: block;
    }
    #faction-search-input {
      width: 100%;
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #555;
      color: #eee;
      font-size: 0.72rem;
      padding: 5px 8px;
      box-sizing: border-box;
      border-radius: 3px;
      outline: none;
    }
    #faction-search-input:focus {
      border-color: #ff8c00;
      box-shadow: 0 0 5px rgba(255, 140, 0, 0.3);
    }
    #faction-search-input::placeholder {
      color: #555;
    }
    #faction-search-dropdown {
      display: none;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 4px;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      background: rgba(8, 8, 8, 0.98);
      position: relative;
      z-index: 1200;
    }
    #faction-search-dropdown::-webkit-scrollbar { width: 6px; }
    #faction-search-dropdown::-webkit-scrollbar-track { background: #111; }
    #faction-search-dropdown::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .faction-search-item {
      padding: 6px 10px;
      font-size: 0.67rem;
      color: #aaa;
      cursor: pointer;
      border-bottom: 1px solid #1e1e1e;
      line-height: 1.4;
    }
    .faction-search-item:last-child { border-bottom: none; }
    .faction-search-item:hover,
    .faction-search-item.active {
      background: rgba(255, 140, 0, 0.15);
      color: #fff;
    }
    .faction-search-item strong { color: #ff8c00; }
    #faction-search-status {
      font-size: 0.6rem;
      color: #555;
      margin-top: 5px;
      text-align: right;
      min-height: 0.9rem;
    }
  </style>

  <title>CanonnED3D - Multi-Faction Map</title>

</head>

<body bgcolor="#000000">
  <script src="https://www.w3schools.com/lib/w3data.js"></script>
  <div w3-include-html="include/nav.html"></div>

  <script>
    w3IncludeHTML();
  </script>

  <div id="edmap">
    <div id="loading">
      <style>
        #bodymovin-wrap{display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999}
        #bodymovin{width:800px;max-width:100%;display:block;overflow:hidden;transform:translate3d(0,0,0)}
        .botas_loop_3,.btas_loop_2{display:none}
      </style>
      <script src="vendor/bodymovin/bodymovin.min.js"></script>
      <div id="bodymovin-wrap"><div id="bodymovin"></div></div>
      <script>
        var anim;
        var animElem = document.getElementById('bodymovin');
        var animData = {
          container: animElem,
          renderer: 'svg',
          loop: true,
          autoplay: true,
          rendererSettings: { progressiveLoad: false },
          path: 'data/rd-banner-v2-1.json'
        };
        anim = bodymovin.loadAnimation(animData);
        if (anim && typeof anim.play === 'function') anim.play();
      </script>
    </div>

    <!-- ED3D Map -->
    <script src="js/ed3dmap.js"></script>
    <link rel="stylesheet" type="text/css" href="css/styles.css" />

    <!-- Multi-Faction data: reads ?factions=Faction+One,Faction+Two from the URL -->
    <script src="data/MapData-multifaction.js"></script>
  </div>
</body>

</html>
